{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Delete Venue - {{ venue.name }}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f7f7f7;}
    .confirm-box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    button { background-color: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
    a { margin-left: 10px; }
  </style>
</head>
<body>
  <div class="confirm-box">
    <h2>Delete Venue</h2>
    <p>Are you sure you want to delete the venue <strong>{{ venue.name }}</strong>?</p>
    <form method="POST" action="{% url 'delete_venue' venue.id %}">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
      <a href="{% url 'manage_venues' %}">Cancel</a>
    </form>
  </div>
</body>
</html>
