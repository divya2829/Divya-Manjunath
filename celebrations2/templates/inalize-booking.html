<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Confirmation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding: 40px 0;
    }

    .confirmation-container {
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 40px;
      border-radius: 10px;
    }

    .theme-name {
      font-size: 24px;
      font-weight: bold;
      color: #FFD700;
    }

    .booking-button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffc107;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 6px rgba(255, 193, 7, 0.3);
    }

    .booking-button:hover {
      background-color: #e0a800;
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(255, 193, 7, 0.4);
    }
  </style>
</head>

<body>

  <div class="confirmation-container">
    <h1>🎉 Booking Confirmation</h1>
    <p>Thank you for choosing your theme! 🎂</p>

    <div>
      <p>Your selected theme is:</p>
      <p class="theme-name" id="selected-theme">Loading...</p>
    </div>

    <div>
      <p>Proceed with your booking and provide your details.</p>
      <a href="finalize-booking.html" class="booking-button">Proceed to Finalize Booking</a>
    </div>
  </div>

  <script>
    // Retrieve the query parameter 'theme' from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const selectedTheme = urlParams.get('theme');

    // Display the selected theme on the page
    if (selectedTheme) {
      document.getElementById('selected-theme').textContent = selectedTheme;
    } else {
      document.getElementById('selected-theme').textContent = 'No theme selected.';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
