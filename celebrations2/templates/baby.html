{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Shower Themes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            position: relative;
            color: #FFD700;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .gallery-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 20px;
            border-radius: 20px;
        }

        .item {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease-in-out;
            text-align: center;
        }

        .item:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        .item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        .booking-button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3);
            text-decoration: none;
        }

        .booking-button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0, 123, 255, 0.4);
        }

        .booking-button:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.7);
        }

        .booking-button:disabled {
            background-color: #c7c7c7;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <video class="video-bg" autoplay loop muted>
        <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
    </video>

    <div class="container gallery-container text-center text-light">
        <h1 class="mb-4">Baby Shower Themes</h1>
        <div class="row g-4">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card">
                    <img src="{% static 'photos/baby1.jpg' %}" class="card-img-top" alt="Krishna Theme">
                    <div class="card-body text-center">
                        <a href="{% url 'krishna_theme' %}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card">
                    <img src="{% static 'photos/baby3.jpg' %}" class="card-img-top" alt="Green Theme">
                    <div class="card-body text-center">
                        <a href="{% url 'shower_green' %}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card">
                    <img src="{% static 'photos/baby12.jpg' %}" class="card-img-top" alt="Flower Theme">
                    <div class="card-body text-center">
                        <a href="{% url 'shower_flower' %}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card">
                    <img src="{% static 'photos/whitebaby.jpg' %}" class="card-img-top" alt="White Theme">
                    <div class="card-body text-center">
                        <a href="{% url 'shower_white' %}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card">
                    <img src="{% static 'photos/baby2.jpg' %}" class="card-img-top" alt="Yellow Theme">
                    <div class="card-body text-center">
                        <a href="{% url 'shower_yellow' %}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
