{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking</title>
    <link rel="stylesheet" href="{% static 'css/booking.css' %}" />
</head>

<body>
    <h1>Alfa Shockwave Celebrations</h1>
    <h3>Booking Events</h3>
    <div class="booking"
         style="background-image: url('{% static 'photos/booking.jpg' %}'); background-size: cover; background-position: center;">

        <form method="post" action="{% url 'booking' %}" id="bookingForm" novalidate>
            {% csrf_token %}
            <div class="img">
                <img src="{% static 'photos/logo.jpg' %}" alt="Logo"
                     style="height: 300px; width: 300px; padding-left: 100px;">
            </div>

            <div class="booking">
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="booking">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" required>
            </div>

            <div class="booking">
                <label for="phone">Phone No:</label>
                <input type="text" name="phone" id="phone" required>
            </div>

            <div class="booking">
                <label for="date">Select Event Date:</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="booking">
                <label for="venue">Venue:</label>
                <input type="text" id="venue" name="venue" readonly>
            </div>

            <h3>Payment Options</h3>
            <div class="payment-options">
                <div class="booking">
                    <label for="payment">Payment Mode:</label>
                    <input type="text" id="payment" name="payment" value="Only cash is accepted" readonly>
                </div>
            </div>

            <button type="submit">Submit Booking</button>
        </form>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param) || "";
        }

        document.addEventListener("DOMContentLoaded", function () {
            const venueInput = document.getElementById("venue");
            const venue = getQueryParam("venue");
            if (venue) {
                venueInput.value = decodeURIComponent(venue);
            }

            const form = document.getElementById("bookingForm");
            const dateInput = document.getElementById("date");

            // Block past dates
            const today = new Date().toISOString().split("T")[0];
            dateInput.setAttribute("min", today);

            form.addEventListener("submit", function (event) {
                const name = document.getElementById("name").value.trim();
                const email = document.getElementById("email").value.trim();
                const phone = document.getElementById("phone").value.trim();
                const date = dateInput.value.trim();

                // Name validation
                if (!/^[A-Za-z\s]+$/.test(name)) {
                    alert("Name should contain only alphabets.");
                    event.preventDefault();
                    return;
                }

                // Email validation
                if (email === "" || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert("Please enter a valid email address.");
                    event.preventDefault();
                    return;
                }

                // Phone validation
                if (!/^\d{10}$/.test(phone)) {
                    alert("Phone number must be exactly 10 digits.");
                    event.preventDefault();
                    return;
                }

                // Date validation
                if (date === "") {
                    alert("Please select an event date.");
                    event.preventDefault();
                    return;
                }

                // Success message (PDF will be downloaded after form is submitted)
                alert("Booking submitted successfully! Your PDF confirmation will download shortly.");
                // Let the form submit to the server
            });
        });
    </script>
</body>

</html>
