{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bride To Be Themes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .gallery-container {
            min-height: 100vh;
            overflow-y: auto;
            padding: 30px 15px;
            color: #FFD700;
            background: rgba(0, 0, 0, 0.6);
        }

        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease-in-out;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card-img-top {
            height: 250px;
            object-fit: cover;
        }

        .btn-outline-primary {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <video class="video-bg" autoplay loop muted>
        <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
    </video>

    <div class="gallery-container text-light">
        <div class="container">
            <h1 class="mb-4 text-center">🎂 Bride To Be Themes</h1>
            <div class="row g-4 justify-content-center">

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card">
                        <img src="{% static 'photos/bride1.jpg' %}" class="card-img-top" alt="Yellow Theme" />
                        <div class="card-body text-center">
                            <a href="{% url 'brown_theme' %}" class="btn btn-outline-primary">Explore</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card">
                        <img src="{% static 'photos/bride4.jpg' %}" class="card-img-top" alt="Golden Theme" />
                        <div class="card-body text-center">
                            <a href="{% url 'bridegold_theme' %}" class="btn btn-outline-primary">Explore</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card">
                        <img src="{% static 'photos/bride6.jpg' %}" class="card-img-top" alt="Pink Theme" />
                        <div class="card-body text-center">
                            <a href="{% url 'bridepink_theme' %}" class="btn btn-outline-primary">Explore</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card">
                        <img src="{% static 'photos/bride2.jpg' %}" class="card-img-top" alt="White Theme" />
                        <div class="card-body text-center">
                            <a href="{% url 'bridewhite_theme' %}" class="btn btn-outline-primary">Explore</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
