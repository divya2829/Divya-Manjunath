{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cartoon Theme</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .gallery-container {
      max-height: 100vh;
      overflow-y: auto;
      padding: 40px 20px;
      border-radius: 20px;
      color: #FFD700;
      background: rgba(0, 0, 0, 0.6);
    }

    .gallery .card {
      background-color: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 12px;
      transition: transform 0.3s ease-in-out;
    }

    .gallery .card:hover {
      transform: scale(1.05);
    }

    .card img {
      border-radius: 12px 12px 0 0;
      object-fit: cover;
      height: 200px;
    }

    .booking-button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffc107;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 6px rgba(255, 193, 7, 0.3);
      text-decoration: none;
      margin-top: 30px;
    }

    .booking-button:hover {
      background-color: #e0a800;
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(255, 193, 7, 0.4);
    }

    .form-check-input {
      margin-top: 10px;
    }

    .cost-label {
      font-weight: bold;
      margin-top: 10px;
      color: #333;
    }
  </style>
</head>

<body>

  <video class="video-bg" autoplay loop muted>
    <source src="{% static 'galvideo.mp4' %}" type="video/mp4" />
  </video>

  <form id="bookingForm">
    <div class="gallery-container text-light">
      <h1 class="mb-4">🎨 Cartoon Theme</h1>
      <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 gallery">

          <!-- Card 1 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/cartoom1.jpg' %}" alt="Tom and Jerry Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹55,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Tom and Jerry Theme" required />
                  <label class="form-check-label">Select Tom and Jerry Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Tom and Jerry Theme', 
                  'Includes: ~120 balloons (yellow, orange, and red), themed cutouts of Tom & Jerry, character centerpieces, cartoon-themed banners, and custom table settings.')">View
                  Details</button>
              </div>
            </div>
          </div>

          <!-- Card 2 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/cartoom2.jpg' %}" alt="Squirrel Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹45,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Squirrel Theme" />
                  <label class="form-check-label">Select Squirrel Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Squirrel Theme', 
                  'Includes: ~100 balloons (brown, cream, and green), adorable squirrel plushies, forest-themed decor, leaf garlands, and wooden accents.')">View
                  Details</button>
              </div>
            </div>
          </div>

          <!-- Card 3 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/cartoom3.jpg' %}" alt="Mickey Mouse Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹40,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Mickey Mouse Theme" />
                  <label class="form-check-label">Select Mickey Mouse Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Mickey Mouse Theme', 
                  'Includes: ~130 balloons (red, black, and yellow), Mickey Mouse ears props, themed tableware, character banners, and fun games.')">View
                  Details</button>
              </div>
            </div>
          </div>

          <!-- Card 4 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/cartoom4.jpg' %}" alt="Mickey Mouse Cake" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹6,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Mickey Mouse Cake" />
                  <label class="form-check-label">Select Mickey Mouse Cake</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Mickey Mouse Cake', 
                  'Delicious themed cake with Mickey Mouse design, suitable for any cartoon-themed party.')">View
                  Details</button>
              </div>
            </div>
          </div>

          <!-- Card 5 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/cartoom5.jpg' %}" alt="Lion Movie Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹45,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Lion Movie Theme" />
                  <label class="form-check-label">Select Lion Movie Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Lion Movie Theme', 
                  'Includes: ~150 balloons (gold, orange, and brown), lion character cutouts, jungle-themed backdrops, and animal print decor.')">View
                  Details</button>
              </div>
            </div>
          </div>

          <!-- Card 6 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/cartoom6.jpg' %}" alt="Cub Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹50,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Cub Theme" />
                  <label class="form-check-label">Select Cub Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Cub Theme', 
                  'Includes: ~140 balloons (light brown, cream, and yellow), cute cub plush toys, themed banners, and forest-themed table decor.')">View
                  Details</button>
              </div>
            </div>
          </div>

        </div>

        <!-- Book Now Button -->
        <div class="text-center mt-4">
          <button type="button" class="booking-button" onclick="redirectToBookingPage();">🎊 Book Now</button>
        </div>

      </div>
    </div>
  </form>

  <!-- Modal -->
  <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-warning">
          <h5 class="modal-title text-dark" id="detailsModalLabel">Theme Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-dark" id="detailsModalContent">
          <!-- Details will appear here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    function redirectToBookingPage() {
      const selectedTheme = document.querySelector('input[name="theme"]:checked');
      if (selectedTheme) {
        const themeLabel = selectedTheme.parentElement.innerText.trim();
        const bookingUrl = "{% url 'theme_booking' %}?theme=" + encodeURIComponent(themeLabel);
        window.location.href = bookingUrl;
      } else {
        alert("Please select a theme.");
      }
    }

    function showDetails(title, description) {
      document.getElementById('detailsModalLabel').innerText = title;
      document.getElementById('detailsModalContent').innerText = description;
      var modal = new bootstrap.Modal(document.getElementById('detailsModal'));
      modal.show();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
