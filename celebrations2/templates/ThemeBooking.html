{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Booking Confirmation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .form-container {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 40px 20px;
      max-width: 600px;
      margin: 80px auto;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .form-title {
      color: #ffc107;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .btn-confirm {
      background-color: #ffc107;
      border: none;
      padding: 12px 30px;
      font-weight: bold;
      border-radius: 8px;
      font-size: 18px;
      box-shadow: 0 4px 8px rgba(255, 193, 7, 0.3);
      transition: all 0.3s ease;
    }

    .btn-confirm:hover {
      background-color: #e0a800;
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(255, 193, 7, 0.4);
    }

    .form-label {
      font-weight: bold;
    }

    .error-message {
      color: red;
      font-size: 0.9em;
      display: none;
    }
  </style>
</head>

<body>
  <video class="video-bg" autoplay loop muted>
    <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
  </video>

  <div class="form-container">
    <h2 class="form-title">🎉 Booking Confirmation</h2>

    <form id="bookingForm" method="post" action="{% url 'confirm_booking' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label for="selectedTheme" class="form-label">Selected Theme</label>
        <input
          type="text"
          id="selectedTheme"
          name="selectedTheme"
          class="form-control"
          readonly
          value="{{ request.GET.theme|default:'' }}"
        />
      </div>

      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input
          type="text"
          class="form-control"
          id="name"
          name="name"
          required
          oninput="validateName()"
          autocomplete="name"
        />
        <div id="fullNameError" class="error-message">Please enter a valid name (letters only).</div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input
          type="tel"
          class="form-control"
          id="phone"
          name="phone"
          required
          oninput="validatePhoneNumber()"
          autocomplete="tel"
        />
        <div id="phoneNumberError" class="error-message">Please enter a valid 10-digit phone number.</div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          required
          autocomplete="email"
        />
      </div>

      <div class="mb-3">
        <label for="date" class="form-label">Event Date</label>
        <input
          type="date"
          class="form-control"
          id="date"
          name="date"
          required
        />
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="startTime" class="form-label">From Time</label>
          <input
            type="time"
            class="form-control"
            id="startTime"
            name="start_time"
            required
          />
        </div>
        <div class="col-md-6 mb-3">
          <label for="endTime" class="form-label">To Time</label>
          <input
            type="time"
            class="form-control"
            id="endTime"
            name="end_time"
            required
          />
        </div>
        <div id="timeError" class="error-message col-12">End time must be later than start time.</div>
      </div>

      <button type="button" class="btn btn-confirm" onclick="submitBookingForm()">✅ Confirm Booking</button>
    </form>
  </div>

  <script>
    // Pre-fill theme from URL (this line is optional because of template var above)
    // Just in case user navigates directly and JS is needed to prefill
    const urlParams = new URLSearchParams(window.location.search);
    const selectedTheme = urlParams.get("theme");
    if (selectedTheme) {
      document.getElementById("selectedTheme").value = selectedTheme;
    }
    document.getElementById("date").setAttribute("min", new Date().toISOString().split("T")[0]);

    function validateName() {
      const nameField = document.getElementById("name");
      const nameValue = nameField.value;
      const nameRegex = /^[A-Za-z\s]*$/;

      if (!nameRegex.test(nameValue)) {
        alert("Please enter only alphabets in the Name field.");
        nameField.value = nameValue.replace(/[^A-Za-z\s]/g, "");
      }
    }

    function validatePhoneNumber() {
      const phoneField = document.getElementById("phone");
      const cleaned = phoneField.value.replace(/\D/g, "");
      phoneField.value = cleaned;

      if (cleaned.length !== 10) {
        document.getElementById("phoneNumberError").style.display = "block";
      } else {
        document.getElementById("phoneNumberError").style.display = "none";
      }
    }

    function validateFullName() {
      const name = document.getElementById("name").value;
      return /^[A-Za-z\s]+$/.test(name);
    }

    function validateTimeRange() {
      const start = document.getElementById("startTime").value;
      const end = document.getElementById("endTime").value;

      if (start && end && start >= end) {
        document.getElementById("timeError").style.display = "block";
        return false;
      } else {
        document.getElementById("timeError").style.display = "none";
        return true;
      }
    }

    function submitBookingForm() {
      let isValid = true;

      if (!validateFullName()) {
        document.getElementById("fullNameError").style.display = "block";
        isValid = false;
      } else {
        document.getElementById("fullNameError").style.display = "none";
      }

      if (document.getElementById("phoneNumberError").style.display === "block") {
        isValid = false;
      }

      if (!validateTimeRange()) {
        isValid = false;
      }

      if (isValid) {
        const confirmSubmit = confirm(
          "Are you sure you want to confirm the booking? You will receive a PDF confirmation."
        );
        if (confirmSubmit) {
          document.getElementById("bookingForm").submit();
        }
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
