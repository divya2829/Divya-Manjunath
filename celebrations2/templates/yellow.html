{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yellow Theme</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      overflow: hidden;
    }
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .gallery-container {
      max-height: 100vh;
      overflow-y: auto;
      padding: 40px 20px;
      border-radius: 20px;
      color: #FFD700;
      background: rgba(0, 0, 0, 0.6);
    }
    .gallery .card {
      background-color: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 12px;
      transition: transform 0.3s ease-in-out;
    }
    .gallery .card:hover {
      transform: scale(1.05);
    }
    .card img {
      border-radius: 12px 12px 0 0;
      object-fit: cover;
      height: 200px;
    }
    .booking-button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffc107;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 6px rgba(255, 193, 7, 0.3);
      text-decoration: none;
      margin-top: 30px;
    }
    .booking-button:hover {
      background-color: #e0a800;
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(255, 193, 7, 0.4);
    }
    .form-check-input {
      margin-top: 10px;
    }
    .cost-label {
      font-weight: bold;
      margin-top: 10px;
      color: #333;
    }
  </style>
</head>

<body>
  <video class="video-bg" autoplay loop muted>
    <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
  </video>

  <form id="bookingForm">
    <div class="gallery-container text-light">
      <h1 class="mb-4">💛 Yellow Theme</h1>
      <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 gallery">

          <!-- CARD 1 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/yellow1.jpg' %}" alt="Yellow HoneyBee Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹35,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Yellow HoneyBee Theme" required />
                  <label class="form-check-label">Select Yellow HoneyBee Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Yellow HoneyBee Theme', '🎈 300 Yellow & Black Balloons\n🐝 Honeybee Cutouts\n🎁 Gift Table Decoration\n🍰 Dessert Table Setup\n🪑 20 Chairs with Yellow Covers\n🎉 Backdrop with Beehive Design\n✨ LED Fairy Lights\n📸 Photo Booth Area')">
                  View Details
                </button>
              </div>
            </div>
          </div>

          <!-- CARD 2 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/ycake.jpg' %}" alt="Yellow Cake" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹5,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Yellow Cake" />
                  <label class="form-check-label">Select Yellow Cake</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Yellow Cake', '🍰 2-Tier Custom Yellow Theme Cake\n🎨 Yellow Fondant with Polka Dots\n🎂 Serves up to 30 guests\n✨ Includes Cake Topper\n📦 Delivered fresh on event day')">
                  View Details
                </button>
              </div>
            </div>
          </div>

          <!-- CARD 3 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/yellow3.jpg' %}" alt="Yellow Minion Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹40,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Yellow Minion Theme" />
                  <label class="form-check-label">Select Yellow Minion Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Yellow Minion Theme', '🎈 350 Yellow & Blue Balloons\n🟡 Minion Standees & Cutouts\n🎯 Fun Minion Games Area\n🎥 Cartoon Screening Zone\n🧁 Snack Counter Decor\n📸 Minion Photo Wall\n🎶 Background Music Setup')">
                  View Details
                </button>
              </div>
            </div>
          </div>

          <!-- CARD 4 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/yellow4.jpeg' %}" alt="Yellow Stars Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹42,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Yellow Stars Theme" />
                  <label class="form-check-label">Select Yellow Stars Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Yellow Stars Theme', '🌟 250 Yellow & Gold Balloons\n✨ Gold Star Cutouts & Backdrop\n🎇 Warm LED Star Lighting\n🪑 Theme Seating for 30 Guests\n🎉 Stage Setup with Drapes\n📸 Fairy Light Photo Booth')">
                  View Details
                </button>
              </div>
            </div>
          </div>

          <!-- CARD 5 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/yellow5.jpg' %}" alt="Yellow & White Flower Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹45,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Yellow & White Flower Theme" />
                  <label class="form-check-label">Select Yellow & White Flower Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Yellow & White Flower Theme', '🌼 Fresh Yellow & White Florals\n🎈 200 Pastel Yellow Balloons\n🪻 Flower Arches & Pillars\n🪑 Floral Table Centerpieces\n🎉 Green Carpet & Stage Draping\n📸 Flower Frame Photo Area')">
                  View Details
                </button>
              </div>
            </div>
          </div>

          <!-- CARD 6 -->
          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/yellow6.jpg' %}" alt="Yellow Flower Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹50,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Yellow Flower Theme" />
                  <label class="form-check-label">Select Yellow Flower Theme</label>
                </div>
                <button type="button" class="btn btn-outline-warning mt-2"
                  onclick="showDetails('Yellow Flower Theme', '🌻 Premium Marigold & Sunflower Decor\n🎈 400 Balloons (Yellow, White, Golden)\n🎪 Drapes, Curtains & Entrance Arch\n💡 Stage Lighting & Ambient Lights\n🪑 Designer Sofa Seating\n📸 Flower Wall for Photography')">
                  View Details
                </button>
              </div>
            </div>
          </div>

        </div>

        <div class="text-center mt-4">
          <button type="button" class="booking-button" onclick="redirectToBookingPage();">🎊 Book Now</button>
        </div>
      </div>
    </div>
  </form>

  <!-- Modal -->
  <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-warning">
          <h5 class="modal-title text-dark" id="detailsModalLabel">Theme Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-dark" id="detailsModalContent" style="white-space: pre-line;">
          <!-- Injected dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    function redirectToBookingPage() {
      const selectedTheme = document.querySelector('input[name="theme"]:checked');
      if (selectedTheme) {
        const themeLabel = selectedTheme.parentElement.innerText.trim();
        const bookingUrl = "{% url 'theme_booking' %}?theme=" + encodeURIComponent(themeLabel);
        window.location.href = bookingUrl;
      } else {
        alert("Please select a theme.");
      }
    }

    function showDetails(title, description) {
      document.getElementById('detailsModalLabel').innerText = title;
      document.getElementById('detailsModalContent').innerText = description;
      var modal = new bootstrap.Modal(document.getElementById('detailsModal'));
      modal.show();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
