{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration</title>
    <link rel="stylesheet" href="{% static 'css/registration.css' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IT+Moderna:wght@100..400&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div>
        <h1>Alfa Shockwave Celebrations</h1>
        <h3>Online Event Registration</h3>
        <h2 style="color: white;text-align: center;">Note: Password must be more than 8 characters</h2>
    </div>

    <!-- Error message container -->
    <div id="error-message" style="color: red; margin-bottom: 10px;"></div>

    <!-- Add onsubmit to call validation -->
    {% if messages %}
    <ul style="color: red;">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <form method="POST" onsubmit="return validateForm();">
        {% csrf_token %}
        <label>Username:</label>
        <input type="text" id="username" name="username" required><br>

        <label>Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label>Password:</label><span>(Password should be more than 8 charcters)</span>
        <input type="password" id="password" name="password" required><br>

        <label>Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required><br>

        <button type="submit">Register</button>
    </form>

    <script>
        function validateForm() {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;
            const errorMessage = document.getElementById("error-message");

            errorMessage.textContent = "";

            if (username.length < 3) {
                errorMessage.textContent = "Username must be at least 3 characters.";
                return false;
            }

            if (!email.includes("@")) {
                errorMessage.textContent = "Please enter a valid email address.";
                return false;
            }

            if (password.length < 8) {
                errorMessage.textContent = "Password must be more than 8 characters.";
                return false;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match.";
                return false;
            }

            return true;
        }
    </script>
</body>

</html>
