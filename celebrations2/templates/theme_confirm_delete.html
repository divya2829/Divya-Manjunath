{% load static %}

{% block content %}
  <div class="container">
    <h2>Delete Theme</h2>
    <p>Are you sure you want to delete the theme "{{ object.name }}"?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'theme_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
{% endblock %}
