{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nikka Outdoor Theme</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .gallery-container {
      max-height: 100vh;
      overflow-y: auto;
      padding: 40px 20px;
      border-radius: 20px;
      color: #FFD700;
      background: rgba(0, 0, 0, 0.6);
    }

    .gallery .card {
      background-color: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 12px;
      transition: transform 0.3s ease-in-out;
    }

    .gallery .card:hover {
      transform: scale(1.05);
    }

    .card img {
      border-radius: 12px 12px 0 0;
      object-fit: cover;
      height: 200px;
    }

    .booking-button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffc107;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 6px rgba(255, 193, 7, 0.3);
      text-decoration: none;
      margin-top: 30px;
    }

    .booking-button:hover {
      background-color: #e0a800;
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(255, 193, 7, 0.4);
    }

    .form-check-input {
      margin-top: 10px;
    }

    .cost-label {
      font-weight: bold;
      margin-top: 10px;
      color: #333;
    }
  </style>
</head>

<body>

  <video class="video-bg" autoplay loop muted>
    <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
  </video>

  <form id="bookingForm">
    <div class="gallery-container text-light">
      <h1 class="mb-4">Nikka Outdoor Theme</h1>
      <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 gallery">

          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/nikkaoutdoor1.jpg' %}" alt="Simple White Nikka Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹20,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Simple White Nikka Theme" required />
                  <label class="form-check-label">Select Simple White Nikka Theme</label>
                </div>
                <button type="button" class="btn btn-warning mt-2" onclick="showDetails('Simple White Nikka Theme')">View Details</button>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/nikkaoutdoor2.jpg' %}" alt="Grand White Nikka Wedding Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹35,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Grand White Nikka Wedding Theme" />
                  <label class="form-check-label">Select Grand White Nikka Wedding Theme</label>
                </div>
                <button type="button" class="btn btn-warning mt-2" onclick="showDetails('Grand White Nikka Wedding Theme')">View Details</button>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/nikkaoutdoor3.jpg' %}" alt="Column White Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹40,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Column White Theme" />
                  <label class="form-check-label">Select Column White Theme</label>
                </div>
                <button type="button" class="btn btn-warning mt-2" onclick="showDetails('Column White Theme')">View Details</button>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/nikkaoutdoor4.jpg' %}" alt="Nikka Cake" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹20,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Nikka Cake" />
                  <label class="form-check-label">Select Nikka Cake</label>
                </div>
                <button type="button" class="btn btn-warning mt-2" onclick="showDetails('Nikka Cake')">View Details</button>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/nikkaoutdoor5.jpg' %}" alt="Royal White Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹45,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Royal White Theme" />
                  <label class="form-check-label">Select Royal White Theme</label>
                </div>
                <button type="button" class="btn btn-warning mt-2" onclick="showDetails('Royal White Theme')">View Details</button>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100 text-center">
              <img src="{% static 'photos/nikkaoutdoor1.jpg' %}" alt="Hanging Red & White Nikka Theme" />
              <div class="card-body">
                <p class="cost-label">Approx Cost: ₹50,000</p>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="theme" value="Hanging Red & White Nikka Theme" />
                  <label class="form-check-label">Select Hanging Red & White Nikka Theme</label>
                </div>
                <button type="button" class="btn btn-warning mt-2" onclick="showDetails('Hanging Red & White Nikka Theme')">View Details</button>
              </div>
            </div>
          </div>

        </div>

        <div class="text-center mt-4">
          <button type="button" class="booking-button" onclick="redirectToBookingPage();">🎊 Book Now</button>
        </div>

      </div>
    </div>
  </form>

  <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header">
          <h5 class="modal-title" id="detailsModalLabel">Theme Details</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalBodyContent"></div>
      </div>
    </div>
  </div>

  <script>
    function showDetails(theme) {
      let details = '';
      if (theme === 'Simple White Nikka Theme') {
        details = `
          <strong>Theme:</strong> Simple White Nikka Theme<br>
          <strong>Balloon Count:</strong> 150 flowers (white and cream shades)<br>
          <strong>Colors Used:</strong> White, Cream<br>
          <strong>Includes:</strong> White drapes, elegant seating, simple flower arrangements, white balloon arches
        `;
      } else if (theme === 'Grand White Nikka Wedding Theme') {
        details = `
          <strong>Theme:</strong> Grand White Nikka Wedding Theme<br>
          <strong>Balloon Count:</strong> 300 flowers (white, gold, cream)<br>
          <strong>Colors Used:</strong> White, Gold, Cream<br>
          <strong>Includes:</strong> Grand floral setup, chandeliers, draped ceilings, grand cake table, elegant seating
        `;
      } else if (theme === 'Column White Theme') {
        details = `
          <strong>Theme:</strong> Column White Theme<br>
          <strong>Balloon Count:</strong> 200 flowers (white and silver)<br>
          <strong>Colors Used:</strong> White, Silver<br>
          <strong>Includes:</strong> Column decorations, white roses, silver accents, LED lighting
        `;
      } else if (theme === 'Nikka Cake') {
        details = `
          <strong>Theme:</strong> Nikka Cake<br>
          <strong>Balloon Count:</strong> 100 flowers (white and gold)<br>
          <strong>Colors Used:</strong> White, Gold<br>
          <strong>Includes:</strong> Cake centerpiece, balloon bouquets, elegant table settings
        `;
      } else if (theme === 'Royal White Theme') {
        details = `
          <strong>Theme:</strong> Royal White Theme<br>
          <strong>Balloon Count:</strong> 350 flowers (white, gold, red)<br>
          <strong>Colors Used:</strong> White, Gold, Red<br>
          <strong>Includes:</strong> Royal drapes, flower walls, royal seating, red carpet, decorative lighting
        `;
      } else if (theme === 'Hanging Red & White Nikka Theme') {
        details = `
          <strong>Theme:</strong> Hanging Red & White Nikka Theme<br>
          <strong>Balloon Count:</strong> 250 flowers (red and white)<br>
          <strong>Colors Used:</strong> Red, White<br>
          <strong>Includes:</strong> Hanging balloon decorations, floral arrangements, elegant seating, mood lighting
        `;
      } else {
        details = "Details not available.";
      }

      document.getElementById('modalBodyContent').innerHTML = details;
      let modal = new bootstrap.Modal(document.getElementById('detailsModal'));
      modal.show();
    }

    function redirectToBookingPage() {
      const selectedTheme = document.querySelector('input[name="theme"]:checked');
      if (selectedTheme) {
        const themeLabel = selectedTheme.value;
        const bookingUrl = "{% url 'theme_booking' %}?theme=" + encodeURIComponent(themeLabel);
        window.location.href = bookingUrl;
      } else {
        alert("Please select a theme.");
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
