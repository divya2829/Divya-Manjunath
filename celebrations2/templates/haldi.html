{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haldi Themes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      overflow-x: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .gallery-container {
      background: rgba(0, 0, 0, 0.6);
      color: #FFD700;
      padding: 30px;
      border-radius: 20px;
      max-height: 100vh;
      overflow-y: auto;
    }

    .gallery-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s ease-in-out;
    }

    .gallery-img:hover {
      transform: scale(1.05);
    }

    .booking-button {
      font-size: 18px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 25px;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3);
    }

    .booking-button:hover {
      background-color: #0056b3;
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(0, 123, 255, 0.4);
    }
  </style>
</head>

<body>
  <video class="video-bg" autoplay loop muted>
    <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
  </video>

  <!-- Gallery Container -->
  <div class="container-fluid gallery-container mt-3">
    <h1 class="text-center mb-4">Haldi Themes</h1>

    <div class="container">
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 gallery">

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/haldi1.jpg' %}" class="card-img-top" alt="Theme 1">
            <div class="card-body text-center">
              <a href="{% url 'flower' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/haldi13.jpg' %}" class="card-img-top" alt="Green Haldi">
            <div class="card-body text-center">
              <a href="{% url 'greenhaldi' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/haldi5.jpg' %}" class="card-img-top" alt="Paradise">
            <div class="card-body text-center">
              <a href="{% url 'paradise' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/haldi21.jpg' %}" class="card-img-top" alt="Pink">
            <div class="card-body text-center">
              <a href="{% url 'pink' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/haldi3.jpg' %}" class="card-img-top" alt="Yellow Haldi">
            <div class="card-body text-center">
              <a href="{% url 'yellowhaldi' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
