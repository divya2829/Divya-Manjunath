{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'css/forgot.css' %}" />

</head>
<body style="background-image: url('/static/photos/forgot.jpg'); background-repeat: no-repeat; background-size: cover; background-position: center; margin: 0; padding: 0;">
    <!-- Your page content here -->
</body>
    <h1>Change Password</h1>
    <form id="forgotForm" method="post">
        {% csrf_token %}
        <input type="password" name="current" placeholder="Current Password" />
        <input type="password" name="new" placeholder="New Password" />
        <input type="password" name="newpassword" placeholder="Confirm New Password" />
        <button type="submit">Change Password</button>
    </form>
</body>
</html>
