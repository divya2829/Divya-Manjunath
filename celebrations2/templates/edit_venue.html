{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Venue - {{ venue.name }}</title>
  <style>
    /* reuse your form styling */
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Edit Venue: {{ venue.name }}</h2>
    <form method="POST" enctype="multipart/form-data" action="{% url 'edit_venue' venue.id %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save Changes</button>
    </form>
  </div>
</body>
</html>
