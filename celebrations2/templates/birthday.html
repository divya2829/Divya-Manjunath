{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Birthday Themes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .gallery-container {
      max-height: 100vh;
      overflow-y: auto;
      padding: 40px 20px;
      border-radius: 20px;
      color: #FFD700;
      background: rgba(0, 0, 0, 0.6);
    }

    .gallery .card {
      background-color: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 12px;
      transition: transform 0.3s ease-in-out;
    }

    .gallery .card:hover {
      transform: scale(1.05);
    }

    .card img {
      border-radius: 12px 12px 0 0;
      object-fit: cover;
      height: 200px;
    }

    .booking-button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3);
      text-decoration: none;
      margin-top: 30px;
    }

    .booking-button:hover {
      background-color: #0056b3;
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(0, 123, 255, 0.4);
    }
  </style>
</head>

<body>
  <video class="video-bg" autoplay loop muted>
    <source src="{% static 'videos/galvideo.mp4' %}" type="video/mp4" />
  </video>

  <div class="gallery-container text-light">
    <h1 class="mb-4">🎂 Birthday Themes</h1>
    <div class="container">
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 gallery">
        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/birthday1.jpg' %}" class="card-img-top" alt="Theme 1" />
            <div class="card-body text-center">
              <a href="{% url 'yellow' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/birthday15.jpg' %}" class="card-img-top" alt="" />
            <div class="card-body text-center">
              <a href="{% url 'cartoon' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/birthday17.jpg' %}" class="card-img-top" alt="" />
            <div class="card-body text-center">
              <a href="{% url 'candy' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/birthday4.jpg' %}" class="card-img-top" alt="" />
            <div class="card-body text-center">
              <a href="{% url 'green' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/blue2.jpg' %}" class="card-img-top" alt="" />
            <div class="card-body text-center">
              <a href="{% url 'skyblue' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="{% static 'photos/birthday6.jpg' %}" class="card-img-top" alt="" />
            <div class="card-body text-center">
              <a href="{% url 'black' %}" class="btn btn-outline-primary">Explore</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
